    :root {
      --color-primary: #FF6B00;
      --color-secondary: #179149;
      --color-black: #000000;
      --color-white: #FFFFFF;
      --color-off-white: #F5F0E8;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      background-color: var(--color-off-white);
      color: var(--color-black);
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--color-off-white);
      border-left: 3px solid var(--color-black);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--color-primary);
      border: 3px solid var(--color-black);
    }

    /* Neubrutalism Global Utilities */
    .brutal-border {
      border: 3px solid var(--color-black) !important;
    }

    .brutal-shadow {
      box-shadow: 6px 6px 0px var(--color-black) !important;
    }

    .brutal-shadow-hover:hover {
      box-shadow: 8px 8px 0px var(--color-black) !important;
      transform: translate(-2px, -2px) !important;
    }

    .brutal-shadow-active:active {
      box-shadow: 2px 2px 0px var(--color-black) !important;
      transform: translate(4px, 4px) !important;
    }

    @keyframes marquee {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-50%);
      }
    }

    .animate-marquee {
      animation: marquee 15s linear infinite;
    }
